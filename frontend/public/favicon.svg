<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#34d399" />
            <stop offset="100%" stop-color="#047857" />
        </linearGradient>
        <linearGradient id="houseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#f0fdf4"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.3" />
        </filter>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.1" />
        </filter>
    </defs>

    <!-- Base squircle with drop shadow and semi-transparent white border to stand out on ANY background -->
    <rect x="8" y="8" width="104" height="104" rx="28" fill="url(#bgGrad)" filter="url(#shadow)" stroke="#ffffff" stroke-width="4" stroke-opacity="0.8" />

    <!-- Stylized House -->
    <!-- M60 28 is the roof peak. Left edge goes to 30 54, right edge to 90 54 -->
    <path d="M60 26 L28 54.5 L34 60.5 L36 58.5 V84 C36 88.4 39.6 92 44 92 H76 C80.4 92 84 88.4 84 84 V58.5 L86 60.5 L92 54.5 Z" fill="url(#houseGrad)" filter="url(#glow)"/>

    <!-- Inner Medical Cross -->
    <path d="M54 52 H66 V62 H76 V74 H66 V84 H54 V74 H44 V62 H54 V52 Z" fill="#047857" />
</svg>
